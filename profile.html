<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KYUDO DOJO - プロフィール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="common.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .profile-grid { display: grid; grid-template-columns: 280px 1fr; gap: 24px; align-items: start; }

    /* 左：プロフィールカード */
    .profile-card { background: white; border-radius: var(--radius); padding: 28px 24px; box-shadow: var(--shadow-sm); text-align: center; animation: fadeUp 0.35s ease both; }
    .profile-avatar-big { width: 80px; height: 80px; border-radius: 50%; background: var(--navy); color: white; font-family: 'Bebas Neue', sans-serif; font-size: 36px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .profile-email { font-size: 13px; color: var(--text-sub); margin-bottom: 6px; word-break: break-all; }
    .profile-rank-badge { display: inline-block; background: var(--green-pale); color: var(--green-dark); font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-bottom: 20px; }
    .profile-divider { border: none; border-top: 1px solid var(--gray-2); margin: 16px 0; }

    .profile-stat-row { display: flex; justify-content: space-around; }
    .profile-stat { text-align: center; }
    .profile-stat-val  { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--text-main); }
    .profile-stat-label { font-size: 10px; color: var(--text-sub); letter-spacing: 0.5px; }

    /* 右：設定パネル */
    .profile-right { display: flex; flex-direction: column; gap: 16px; }

    .settings-card { background: white; border-radius: var(--radius); padding: 22px 24px; box-shadow: var(--shadow-sm); animation: fadeUp 0.35s 0.1s ease both; }
    .settings-title { font-size: 14px; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }

    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--gray-1); }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 13px; color: var(--text-main); }
    .settings-sub   { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

    .settings-input { border: 1.5px solid var(--gray-2); border-radius: 8px; padding: 7px 12px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; outline: none; width: 180px; }
    .settings-input:focus { border-color: var(--green-mid); }

    .settings-select { border: 1.5px solid var(--gray-2); border-radius: 8px; padding: 7px 12px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; outline: none; background: white; cursor: pointer; }

    .btn-save-settings {
      padding: 10px 24px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 16px;
    }
    .btn-save-settings:hover { opacity: 0.85; }

    .danger-zone { background: #fdecea; border-radius: var(--radius); padding: 18px 20px; }
    .danger-title { font-size: 13px; font-weight: 700; color: #c0392b; margin-bottom: 12px; }
    .btn-danger { padding: 9px 18px; background: white; color: #c0392b; border: 1.5px solid #c0392b; border-radius: 8px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-danger:hover { background: #c0392b; color: white; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <aside class="sidebar">
    <a href="profile.html" class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">弓</div>
      <div class="user-info">
        <p class="user-name" id="sidebar-name">読み込み中...</p>
        <p class="user-rank">Rank: Shodan</p>
      </div>
    </a>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dojo
      </a>
      <a href="stats.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Stats
      </a>
      <a href="mato.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
        Mato
      </a>
      <a href="profile.html" class="nav-item active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </a>
    </nav>
    <div class="sidebar-bottom">
      <a href="support.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Support
      </a>
      <a href="login.html" class="nav-item signout" onclick="handleSignOut(event)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </a>
    </div>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <h1 class="page-title" style="font-family:'Noto Sans JP',sans-serif;font-size:20px;font-weight:700;letter-spacing:0;">プロフィール</h1>
      <div class="header-actions">
        <a href="profile.html" class="avatar-btn" id="header-avatar">弓</a>
      </div>
    </header>

    <div class="profile-grid">
      <!-- 左：プロフィールカード -->
      <div class="profile-card">
        <div class="profile-avatar-big" id="profile-avatar-big">弓</div>
        <p style="font-size:15px;font-weight:700;margin-bottom:4px;" id="profile-display-name">Kyudojin</p>
        <p class="profile-email" id="profile-email">読み込み中...</p>
        <span class="profile-rank-badge">Rank: Shodan</span>
        <hr class="profile-divider" />
        <div class="profile-stat-row">
          <div class="profile-stat">
            <p class="profile-stat-val" id="stat-total-shots">-</p>
            <p class="profile-stat-label">総射数</p>
          </div>
          <div class="profile-stat">
            <p class="profile-stat-val" id="stat-avg-pct">-</p>
            <p class="profile-stat-label">平均的中率</p>
          </div>
          <div class="profile-stat">
            <p class="profile-stat-val" id="stat-days">-</p>
            <p class="profile-stat-label">練習日数</p>
          </div>
        </div>
      </div>

      <!-- 右：設定 -->
      <div class="profile-right">
        <div class="settings-card">
          <p class="settings-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            基本情報
          </p>
          <div class="settings-row">
            <div>
              <p class="settings-label">表示名</p>
              <p class="settings-sub">道場内での名前</p>
            </div>
            <input type="text" class="settings-input" id="input-name" placeholder="例：弓道太郎" />
          </div>
          <div class="settings-row">
            <div>
              <p class="settings-label">段位</p>
            </div>
            <select class="settings-select" id="input-rank">
              <option value="mudan">無段</option>
              <option value="shodan" selected>初段</option>
              <option value="nidan">二段</option>
              <option value="sandan">三段</option>
              <option value="yondan">四段</option>
              <option value="godan">五段</option>
              <option value="rokudan">六段</option>
            </select>
          </div>
          <div class="settings-row">
            <div>
              <p class="settings-label">道場名</p>
            </div>
            <input type="text" class="settings-input" id="input-dojo" placeholder="例：〇〇弓道場" />
          </div>
          <div class="settings-row">
            <div>
              <p class="settings-label">弓の強さ</p>
            </div>
            <select class="settings-select" id="input-bow">
              <option value="10">10kg</option>
              <option value="12">12kg</option>
              <option value="14">14kg</option>
              <option value="16" selected>16kg</option>
              <option value="18">18kg</option>
              <option value="20">20kg</option>
            </select>
          </div>
          <button class="btn-save-settings" onclick="saveSettings()">設定を保存</button>
        </div>

        <div class="settings-card danger-zone">
          <p class="danger-title">⚠ アカウント</p>
          <div class="settings-row" style="border:none;padding-top:0;">
            <div>
              <p class="settings-label">ログアウト</p>
              <p class="settings-sub">別のアカウントでログインする場合</p>
            </div>
            <button class="btn-danger" onclick="handleSignOut(event)">ログアウト</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="supabase.js"></script>
  <script>
    async function init() {
      const user = await getCurrentUser();
      if (!user) { window.location.href = 'login.html'; return; }

      const initial = user.email ? user.email[0].toUpperCase() : '弓';
      ['sidebar-avatar','header-avatar','profile-avatar-big'].forEach(id => {
        document.getElementById(id).textContent = initial;
      });
      document.getElementById('sidebar-name').textContent = user.email || 'Kyudojin';
      document.getElementById('profile-email').textContent = user.email || '';

      // ローカルストレージから設定を読み込む
      const saved = JSON.parse(localStorage.getItem('kyudo-profile') || '{}');
      if (saved.name)  { document.getElementById('input-name').value = saved.name; document.getElementById('profile-display-name').textContent = saved.name; }
      if (saved.rank)    document.getElementById('input-rank').value  = saved.rank;
      if (saved.dojo)    document.getElementById('input-dojo').value  = saved.dojo;
      if (saved.bow)     document.getElementById('input-bow').value   = saved.bow;

      // 統計を取得
      try {
        const shots = await getRecentShots(365);
        const hits  = shots.filter(s => s.result).length;
        const days  = new Set(shots.map(s => s.shot_date)).size;
        const pct   = shots.length > 0 ? Math.round(hits / shots.length * 100) : 0;

        document.getElementById('stat-total-shots').textContent = shots.length || '-';
        document.getElementById('stat-avg-pct').textContent     = shots.length > 0 ? pct + '%' : '-';
        document.getElementById('stat-days').textContent        = days || '-';
      } catch(e) { console.error(e); }
    }

    function saveSettings() {
      const profile = {
        name: document.getElementById('input-name').value,
        rank: document.getElementById('input-rank').value,
        dojo: document.getElementById('input-dojo').value,
        bow:  document.getElementById('input-bow').value,
      };
      localStorage.setItem('kyudo-profile', JSON.stringify(profile));
      if (profile.name) document.getElementById('profile-display-name').textContent = profile.name;
      alert('設定を保存しました！');
    }

    async function handleSignOut(e) {
      e.preventDefault();
      await signOut();
    }

    init();
  </script>
</body>
</html>
