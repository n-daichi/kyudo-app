<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KYUDO DOJO - ログイン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
  <!-- Supabaseライブラリ（CDNから読み込む） -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="bg-wrapper">
    <div class="bg-silhouette"></div>
    <div class="bg-overlay"></div>
  </div>

  <div class="page-center">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <span class="logo-text">KYUDO DOJO</span>
      </div>
      <p class="tagline">弓道的中管理アプリ「弓道手帳」</p>

      <h2 class="form-title">ログイン</h2>

      <form class="login-form" onsubmit="handleLogin(event)">
        <div class="field-group">
          <label>ユーザーID / メールアドレス</label>
          <div class="input-wrapper">
            <input type="email" placeholder="example@kyudo.jp" id="email" autocomplete="email" />
            <span class="input-icon">@</span>
          </div>
        </div>

        <div class="field-group">
          <label>パスワード</label>
          <div class="input-wrapper">
            <input type="password" placeholder="••••••••" id="password" autocomplete="current-password" />
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
          </div>
        </div>

        <button type="submit" class="btn-login">
          ログイン
          <span class="btn-arrow">→</span>
        </button>

        <a href="#" class="forgot-link">パスワードをお忘れの方はこちら</a>
      </form>
    </div>

    <div class="register-row">
      <span>アカウントをお持ちでいらっしゃいませんか？</span>
      <a href="#" class="btn-register" onclick="handleRegister()">新規登録 ↗</a>
    </div>
  </div>
  <!-- supabase.jsを先に読み込む（login.jsより前に必要） -->
  <script src="supabase.js"></script>
  <script src="login.js"></script>
</body>
</html>
